name: Build & Push Qwen-Edit Serverless Worker

on:
  push:
    paths:
      - 'docker/QwenServerless/**'
      - '.github/workflows/build-qwen-worker.yml'
  workflow_dispatch: # Permite ejecución manual desde la web de GitHub

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: qwen-i2i-serverless-runpod

jobs:
  build-and-push:
    # Usar self-hosted runners o los default grandes de Github (si la capa ocupa 20GB de descargas)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        # Github Runners tienen ~14GB libres por defecto. Precisamos borrar librerías/herramientas preinstaladas para hostear 20GB de pesos en memoria temporal de Build
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: false

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/QwenServerless
          file: ./docker/QwenServerless/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          # Aumentar cache para builds posteriores
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
